{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — NexusFlow</title>
    <link rel="icon" type="image/svg+xml" href="{% static 'nexusflow_icon.svg' %}">
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'favicon-32x32.png' %}">
    <link rel="icon" type="image/png" sizes="16x16" href="{% static 'favicon-16x16.png' %}">
    <link rel="apple-touch-icon" sizes="180x180" href="{% static 'apple-touch-icon.png' %}">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-bg: #05071a;
            --card-bg: #0f1235;
            --accent-pink: #ff007a;
            --accent-blue: #00d4ff;
            --text-gray: #b0b3c1;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0;
            font-family: 'Poppins', sans-serif;
            background-color: var(--primary-bg);
            color: white;
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }

        .main-container {
            width: 90%; max-width: 1000px; height: 85vh;
            display: flex; background: var(--card-bg);
            border-radius: 30px; overflow: hidden; border: 1px solid var(--glass);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        /* Side Panels */
        .illustration-side {
            flex: 1; background: linear-gradient(135deg, rgba(15, 18, 53, 0.8), rgba(5, 7, 26, 0.9));
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 40px; position: relative; border-right: 1px solid var(--glass);
        }
        .form-side { flex: 1.2; padding: 40px; overflow-y: auto; background: #0a0d28; }

        .logo-top { position: absolute; top: 30px; left: 30px; height: 45px; }
        .hero-img { width: 100%; max-width: 320px; filter: drop-shadow(0 0 15px var(--accent-blue)); }

        h2 { font-size: 2rem; font-weight: 800; margin: 0; color: white; }
        .subtitle { color: var(--text-gray); font-size: 0.85rem; margin-bottom: 25px; }

        /* Form Controls */
        .input-group { display: flex; flex-direction: column; margin-bottom: 15px; }
        .input-group label { font-size: 0.7rem; color: var(--accent-blue); font-weight: 600; margin-bottom: 5px; text-transform: uppercase; }
        .input-group input {
            background: rgba(255,255,255,0.05); border: 1px solid var(--glass);
            padding: 12px; border-radius: 10px; color: white; outline: none; transition: 0.3s;
        }
        .input-group input:focus { border-color: var(--accent-pink); background: rgba(255,255,255,0.1); }

        /* Real-time feedback */
        #emailFeedback { font-size: 0.7rem; margin-top: 5px; min-height: 15px; }
        .text-error { color: var(--accent-pink); }
        .text-success { color: var(--accent-blue); }

        .submit-btn {
            width: 100%; padding: 15px; margin-top: 20px; border: none; border-radius: 50px;
            background: linear-gradient(90deg, var(--accent-pink), #ff4d97);
            color: white; font-weight: 700; text-transform: uppercase; cursor: pointer; transition: 0.3s;
        }
        .submit-btn:disabled { background: #2a2d3e !important; opacity: 0.5; cursor: not-allowed; }

        .footer { text-align: center; margin-top: 20px; font-size: 0.8rem; color: var(--text-gray); }
        .footer a { color: var(--accent-blue); text-decoration: none; font-weight: 600; }

        @media (max-width: 850px) { .illustration-side { display: none; } }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="illustration-side">
            <div class="logo-top" style="display:flex;align-items:center;gap:10px;">
            <img src="{% static 'nexusflow_icon.svg' %}" style="height:38px;width:38px;border-radius:8px;">
            <span style="font-family:'Plus Jakarta Sans',sans-serif;font-size:1.2rem;
                        font-weight:800;color:#fff;letter-spacing:-0.5px;">
                Nexus<span style="color:#00d4ff;">Flow</span>
            </span>
            </div>
            <img src="https://cdni.iconscout.com/illustration/premium/thumb/forgot-password-4268414-3551761.png" class="hero-img">
            <h3 style="margin-top: 20px;">Identity <span style="color: var(--accent-pink);">Check</span></h3>
        </div>

        <div class="form-side">
            <h2>Identify Yourself</h2>
            <p class="subtitle">Enter your details to receive a password reset link.</p>

            {% if messages %}
                {% for message in messages %}
                    <div style="background: rgba(255, 0, 122, 0.1); color: var(--accent-pink); padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 0.8rem;">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="input-group">
                        <label>First Name</label>
                        <input type="text" name="first_name" required placeholder="John">
                    </div>
                    <div class="input-group">
                        <label>Last Name</label>
                        <input type="text" name="last_name" required placeholder="Doe">
                    </div>
                </div>

                <div class="input-group">
                    <label>College ID</label>
                    <input type="text" name="college_id" required placeholder="10 Character ID">
                </div>

                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="emailInput" name="email" required placeholder="name@college.edu">
                    <div id="emailFeedback"></div>
                </div>

                <button type="submit" id="submitBtn" class="submit-btn" disabled>
                    Send Verification Link
                </button>
            </form>

            <div class="footer">
                <p>Remembered your password? <a href="{% url 'login' %}">Log in</a></p>
            </div>
        </div>
    </div>

    <script>
        const emailInput = document.getElementById('emailInput');
        const feedback = document.getElementById('emailFeedback');
        const submitBtn = document.getElementById('submitBtn');

        let timeout = null;

        emailInput.addEventListener('input', function() {
            const email = this.value;
            clearTimeout(timeout);

            if (email.includes('@')) {
                feedback.innerHTML = 'Checking...';
                feedback.className = 'text-success';

                // Debounce: Wait 500ms after user stops typing to call server
                timeout = setTimeout(() => {
                    fetch(`/ajax/check-email/?email=${encodeURIComponent(email)}`)
                        .then(response => response.json())
                        .then(data => {
                            if (data.is_taken) {
                                feedback.innerHTML = '✓ Account linked to this email found.';
                                feedback.className = 'text-success';
                                submitBtn.disabled = false;
                            } else {
                                feedback.innerHTML = '✗ No account found with this email.';
                                feedback.className = 'text-error';
                                submitBtn.disabled = true;
                            }
                        })
                        .catch(err => {
                            console.error('AJAX Error:', err);
                        });
                }, 500);
            } else {
                feedback.innerHTML = '';
                submitBtn.disabled = true;
            }
        });
    </script>
</body>
</html>

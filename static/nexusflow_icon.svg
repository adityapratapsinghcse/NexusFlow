<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Dark background card -->
  <rect x="0" y="0" width="200" height="200" rx="36" fill="#05071a"/>
  <!-- Subtle cyan border -->
  <rect x="2" y="2" width="196" height="196" rx="34" fill="none" stroke="#00d4ff" stroke-width="0.8" opacity="0.25"/>
  <!-- N in white -->
  <text x="18" y="158"
    font-family="'Plus Jakarta Sans', sans-serif"
    font-size="130" font-weight="900"
    fill="#ffffff">N</text>
  <!-- F in cyan, overlapping N's right leg -->
  <text x="104" y="158"
    font-family="'Plus Jakarta Sans', sans-serif"
    font-size="130" font-weight="900"
    fill="#00d4ff" opacity="0.88">F</text>
  <!-- Flow arc underneath -->
  <path d="M 22 175 Q 100 196 178 175"
    fill="none" stroke="#00d4ff"
    stroke-width="3.5" stroke-linecap="round"/>
  <!-- Cyan dot (end of arc) -->
  <circle cx="178" cy="175" r="6" fill="#00d4ff"/>
  <!-- Pink dot (start of arc) -->
  <circle cx="22" cy="175" r="5" fill="#ff007a"/>
  <!-- Pink accent dot top-right -->
  <circle cx="172" cy="28" r="7" fill="#ff007a"/>
</svg>